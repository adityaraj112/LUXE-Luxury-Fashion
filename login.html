<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — LUXE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css"><link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/layout.css">
  <style>
    .auth-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:var(--spacing-xl);background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,0.08),transparent 60%)}
    .auth-box{width:100%;max-width:480px;background:var(--color-bg-secondary);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--spacing-2xl);animation:scaleIn 0.4s ease}
    .auth-logo{text-align:center;margin-bottom:var(--spacing-xl);font-family:var(--font-heading);font-size:2.2rem}
  </style>
</head>
<body>
<div id="navbar-mount"></div>
<div class="auth-wrapper" style="padding-top:calc(var(--navbar-height) + 40px)">
  <div class="auth-box" role="main">
    <div class="auth-logo">LU<span style="color:var(--color-gold)">X</span>E</div>

    <!-- Tabs -->
    <div class="tabs-wrapper">
      <div class="tabs-nav" role="tablist" style="justify-content:center">
        <button class="tab-btn active" data-tab="login" role="tab" aria-selected="true" id="login-tab-btn">Sign In</button>
        <button class="tab-btn" data-tab="register" role="tab" aria-selected="false" id="register-tab-btn">Create Account</button>
      </div>

      <!-- LOGIN -->
      <div data-tab-content="login" class="tab-content active" role="tabpanel">
        <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:var(--spacing-lg)">
          <button class="social-btn" onclick="showToast('Social login coming soon','info','ℹ️')">
            <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Continue with Google
          </button>
          <button class="social-btn" onclick="showToast('Social login coming soon','info','ℹ️')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Continue with Facebook
          </button>
        </div>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:var(--spacing-lg)">
          <div style="flex:1;height:1px;background:var(--color-border)"></div>
          <span style="font-size:0.78rem;color:var(--color-text-dim)">or</span>
          <div style="flex:1;height:1px;background:var(--color-border)"></div>
        </div>
        <form id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="login-email">Email</label>
            <input type="email" class="form-input" id="login-email" autocomplete="email" required>
            <p class="form-error" id="err-login-email"></p>
          </div>
          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <div class="input-group">
              <input type="password" class="form-input" id="login-password" autocomplete="current-password" required>
              <button type="button" class="input-append" onclick="togglePwd('login-password', this)" aria-label="Show password">👁</button>
            </div>
            <p class="form-error" id="err-login-password"></p>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--spacing-lg)">
            <label class="checkbox-label"><input type="checkbox" checked><span class="checkmark"></span>Remember me</label>
            <a href="#" style="font-size:0.82rem;color:var(--color-gold)">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg">Sign In</button>
        </form>
        <p style="text-align:center;font-size:0.82rem;margin-top:var(--spacing-lg);color:var(--color-text-dim)">
          Don't have an account? <a href="#" onclick="switchToRegister()" style="color:var(--color-gold)">Create one</a>
        </p>
      </div>

      <!-- REGISTER -->
      <div data-tab-content="register" class="tab-content" role="tabpanel">
        <form id="register-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="reg-name">Full Name</label>
            <input type="text" class="form-input" id="reg-name" autocomplete="name" required>
            <p class="form-error" id="err-reg-name"></p>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-email">Email</label>
            <input type="email" class="form-input" id="reg-email" autocomplete="email" required>
            <p class="form-error" id="err-reg-email"></p>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-phone">Phone (optional)</label>
            <input type="tel" class="form-input" id="reg-phone" autocomplete="tel">
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-password">Password</label>
            <div class="input-group">
              <input type="password" class="form-input" id="reg-password" autocomplete="new-password" required>
              <button type="button" class="input-append" onclick="togglePwd('reg-password', this)" aria-label="Show password">👁</button>
            </div>
            <div class="password-strength">
              <div class="strength-bars"><div class="strength-bar" id="sb1"></div><div class="strength-bar" id="sb2"></div><div class="strength-bar" id="sb3"></div><div class="strength-bar" id="sb4"></div></div>
              <span class="strength-label" id="strength-label">Enter a password</span>
            </div>
            <p class="form-error" id="err-reg-password"></p>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-confirm">Confirm Password</label>
            <div class="input-group">
              <input type="password" class="form-input" id="reg-confirm" autocomplete="new-password" required>
              <button type="button" class="input-append" onclick="togglePwd('reg-confirm', this)" aria-label="Show password">👁</button>
            </div>
            <p class="form-error" id="err-reg-confirm"></p>
          </div>
          <div style="margin-bottom:var(--spacing-lg)">
            <label class="checkbox-label"><input type="checkbox" id="reg-terms" required><span class="checkmark"></span>I agree to the <a href="#" style="color:var(--color-gold)">Terms of Service</a> and <a href="#" style="color:var(--color-gold)">Privacy Policy</a></label>
            <p class="form-error" id="err-reg-terms"></p>
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account</button>
        </form>
        <p style="text-align:center;font-size:0.82rem;margin-top:var(--spacing-lg);color:var(--color-text-dim)">
          Already have an account? <a href="#" onclick="switchToLogin()" style="color:var(--color-gold)">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
<div id="footer-mount"></div>
<script src="js/products.js"></script><script src="js/cart.js"></script><script src="js/ui.js"></script><script src="js/layout.js"></script>
<script>
function togglePwd(id, btn) {
  const inp = document.getElementById(id);
  const showing = inp.type === 'text';
  inp.type = showing ? 'password' : 'text';
  btn.textContent = showing ? '👁' : '🙈';
}
function switchToRegister() {
  document.getElementById('login-tab-btn').classList.remove('active');
  document.getElementById('register-tab-btn').classList.add('active');
  document.querySelector('[data-tab-content="login"]').classList.remove('active');
  document.querySelector('[data-tab-content="register"]').classList.add('active');
}
function switchToLogin() {
  document.getElementById('register-tab-btn').classList.remove('active');
  document.getElementById('login-tab-btn').classList.add('active');
  document.querySelector('[data-tab-content="register"]').classList.remove('active');
  document.querySelector('[data-tab-content="login"]').classList.add('active');
}

// Password strength
document.getElementById('reg-password')?.addEventListener('input', function() {
  const v = this.value;
  let strength = 0;
  if (v.length >= 8) strength++;
  if (/[A-Z]/.test(v)) strength++;
  if (/[0-9]/.test(v)) strength++;
  if (/[^A-Za-z0-9]/.test(v)) strength++;
  const bars = ['sb1','sb2','sb3','sb4'];
  const classes = ['','weak','fair','fair','strong'];
  const labels = ['Enter a password','Weak','Fair','Good','Strong'];
  bars.forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'strength-bar' + (i < strength ? ' ' + (strength <= 1 ? 'weak' : strength <= 2 ? 'fair' : 'strong') : '');
  });
  document.getElementById('strength-label').textContent = labels[strength];
});

document.getElementById('login-form')?.addEventListener('submit', e => {
  e.preventDefault();
  const email = document.getElementById('login-email').value;
  const pwd = document.getElementById('login-password').value;
  let valid = true;
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('err-login-email').textContent='Valid email required'; valid=false; } else document.getElementById('err-login-email').textContent='';
  if (!pwd) { document.getElementById('err-login-password').textContent='Password required'; valid=false; } else document.getElementById('err-login-password').textContent='';
  if (!valid) return;
  const result = Auth.login(email, pwd);
  if (result.success) { showToast('Welcome back, ' + result.user.name + '!', 'success', '✓'); setTimeout(() => window.location.href = 'account.html', 800); }
  else { document.getElementById('err-login-email').textContent = result.error; }
});

document.getElementById('register-form')?.addEventListener('submit', e => {
  e.preventDefault();
  const name = document.getElementById('reg-name').value;
  const email = document.getElementById('reg-email').value;
  const phone = document.getElementById('reg-phone').value;
  const pwd = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;
  const terms = document.getElementById('reg-terms').checked;
  let valid = true;
  const setErr = (id, msg) => { document.getElementById(id).textContent = msg; if(msg) valid=false; };
  if (!name.trim()) setErr('err-reg-name','Name required'); else setErr('err-reg-name','');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) setErr('err-reg-email','Valid email required'); else setErr('err-reg-email','');
  if (pwd.length < 8) setErr('err-reg-password','Password must be at least 8 characters'); else setErr('err-reg-password','');
  if (pwd !== confirm) setErr('err-reg-confirm','Passwords do not match'); else setErr('err-reg-confirm','');
  if (!terms) setErr('err-reg-terms','Please accept the terms'); else setErr('err-reg-terms','');
  if (!valid) return;
  const result = Auth.register(name, email, pwd, phone);
  if (result.success) { showToast('Account created! Welcome to LUXE.', 'success', '✓'); setTimeout(() => window.location.href = 'account.html', 800); }
  else { document.getElementById('err-reg-email').textContent = result.error; }
});

// Pre-fill URL params
document.addEventListener('DOMContentLoaded', () => {
  if (new URLSearchParams(window.location.search).get('tab') === 'register') switchToRegister();
  if (Auth.isLoggedIn()) window.location.href = 'account.html';
});
</script>
</body>
</html>
